backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: 'id'

collections:
  # --- Berita ---
  - name: "berita"
    label: "Berita & Informasi"
    folder: "src/content/berita"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - label: "Kategori"
        name: "category"
        widget: "select"
        options: ["Berita", "Agenda", "Artikel", "Pengumuman"]
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Ringkasan", name: "excerpt", widget: "text" }
      - { label: "Penulis", name: "author", widget: "string", default: "Admin Desa" }
      - { label: "Tampilkan di Beranda", name: "featured", widget: "boolean", default: false }
      - { label: "Konten", name: "body", widget: "markdown" }

  # --- Perangkat Desa ---
  - name: "perangkat_desa"
    label: "Perangkat Desa"
    folder: "src/content/perangkat-desa"
    create: true
    fields:
      - { label: "Nama", name: "nama", widget: "string" }
      - { label: "Jabatan", name: "jabatan", widget: "string" }
      - { label: "Foto", name: "foto", widget: "image", required: false }
      - { label: "Urutan", name: "urutan", widget: "number", value_type: "int" }
      - { label: "Deskripsi", name: "deskripsi", widget: "text", required: false }


  # --- Galeri ---
  - name: "galeri"
    label: "Galeri & Dokumentasi"
    folder: "src/content/galeri"
    create: true
    fields:
      - { label: "Judul", name: "judul", widget: "string" }
      - { label: "Tanggal", name: "tanggal", widget: "date" }
      - label: "Kategori"
        name: "kategori"
        widget: "select"
        options: ["Kegiatan", "Pembangunan", "Budaya", "Pertanian", "Lainnya"]
      - { label: "Foto", name: "foto", widget: "image" }
      - { label: "Deskripsi", name: "deskripsi", widget: "text" }

  # --- Kelompok Tani ---
  - name: "kelompok_tani"
    label: "Kelompok Tani"
    folder: "src/content/kelompok-tani"
    create: true
    fields:
      - { label: "Nama Kelompok", name: "nama", widget: "string" }
      - { label: "Ketua", name: "ketua", widget: "string" }
      - { label: "Dusun", name: "dusun", widget: "string" }
      - { label: "Komoditas Utama", name: "komoditas_utama", widget: "string" }
      - { label: "Jumlah Anggota", name: "jumlah_anggota", widget: "number", value_type: "int" }
      - { label: "Deskripsi", name: "deskripsi", widget: "text" }
      - { label: "Kontak", name: "kontak", widget: "string", required: false }

  # --- Layanan Darurat ---
  - name: "layanan_darurat"
    label: "Kontak Darurat"
    folder: "src/content/layanan-darurat"
    create: true
    fields:
      - { label: "Nama", name: "nama", widget: "string" }
      - label: "Jenis"
        name: "jenis"
        widget: "select"
        options: ["Kesehatan", "Keamanan", "Darurat"]
      - { label: "Telepon", name: "telepon", widget: "string" }
      - { label: "Alamat", name: "alamat", widget: "string" }
      - { label: "Deskripsi", name: "deskripsi", widget: "text" }

  # --- Pengaturan Umum (Single File) ---
  - name: "pengaturan"
    label: "Pengaturan"
    files:
      - label: "Pengaturan Umum"
        name: "umum"
        file: "src/content/pengaturan/umum.json"
        fields:
          - { label: "Nama Desa", name: "nama_desa", widget: "string" }
          - { label: "Kecamatan", name: "kecamatan", widget: "string" }
          - { label: "Kabupaten", name: "kabupaten", widget: "string" }
          - { label: "Provinsi", name: "provinsi", widget: "string" }
          - { label: "Visi", name: "visi", widget: "text" }
          - { label: "Sejarah Singkat", name: "sejarah", widget: "markdown" }
          - label: "Misi"
            name: "misi"
            widget: "list"
            field: { label: "Item Misi", name: "item", widget: "string" }
          - { label: "Alamat Kantor", name: "alamat_kantor", widget: "text" }
          - { label: "Telepon", name: "telepon", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Jam Operasional", name: "jam_operasional", widget: "text" }

  # --- Halaman Website (Single File) ---
  - name: "halaman"
    label: "Halaman Website"
    files:
      - label: "Halaman Beranda"
        name: "beranda"
        file: "src/content/halaman/beranda.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Hero Background Image", name: "hero_bg", widget: "image", required: false }
          - { label: "Highlight Title", name: "highlight_title", widget: "string" }
          - { label: "Highlight Description", name: "highlight_desc", widget: "text" }
          - { label: "Highlight Image", name: "highlight_image", widget: "image", required: false }
          - label: "Statistik"
            name: "statistik"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }

      - label: "Halaman Profil"
        name: "profil"
        file: "src/content/halaman/profil.json"
        fields:
          - { label: "Kata Sambutan", name: "sambutan", widget: "text" }
          - { label: "Nama Kepala Desa", name: "nama_kades", widget: "string" }
          - { label: "Foto Kepala Desa", name: "foto_kades", widget: "image" }
          - { label: "Luas Wilayah (km2)", name: "luas_wilayah", widget: "string" }
          - { label: "Dusun", name: "dusun", widget: "list", field: { label: "Nama Dusun", name: "nama", widget: "string" } }
          - { label: "Total Penduduk", name: "penduduk_total", widget: "string" }
          - { label: "Penduduk Pria", name: "penduduk_pria", widget: "string" }
          - { label: "Penduduk Wanita", name: "penduduk_wanita", widget: "string" }
          - label: "Demografi Dusun"
            name: "demo_dusun"
            widget: "list"
            fields:
              - { label: "Nama Dusun", name: "label", widget: "string" }
              - { label: "Jumlah", name: "value", widget: "number", value_type: "int" }
          - label: "Demografi Pendidikan"
            name: "demo_pendidikan"
            widget: "list"
            fields:
              - { label: "Tingkat Pendidikan", name: "label", widget: "string" }
              - { label: "Jumlah", name: "value", widget: "number", value_type: "int" }
          - label: "Transparansi APBDes"
            name: "apbdes"
            widget: "object"
            fields:
              - { label: "Total Pendapatan", name: "pendapatan", widget: "string" }
              - { label: "Total Belanja", name: "belanja", widget: "string" }
              - label: "Riwayat Tahunan"
                name: "riwayat"
                widget: "list"
                fields:
                  - { label: "Tahun", name: "tahun", widget: "string" }
                  - { label: "Pendapatan (Rp)", name: "pendapatan", widget: "number", value_type: "int" }
                  - { label: "Belanja (Rp)", name: "belanja", widget: "number", value_type: "int" }

      - label: "Halaman Pertanian"
        name: "pertanian"
        file: "src/content/halaman/pertanian.json"
        fields:
          - { label: "Luas Lahan (Ha)", name: "luas_lahan", widget: "string" }
          - { label: "Komoditas Utama", name: "komoditas", widget: "string" }
          - { label: "Jumlah Kelompok Tani", name: "jumlah_kelompok", widget: "string" }
          - { label: "Jumlah Petani", name: "jumlah_petani", widget: "string" }
          - { label: "Jenis Irigasi", name: "irigasi", widget: "string" }
          - { label: "Produktivitas (Ton/Ha)", name: "produktivitas", widget: "string" }

      - label: "Halaman Layanan"
        name: "layanan"
        file: "src/content/halaman/layanan.json"
        fields:
          - label: "Layanan Administrasi"
            name: "administrasi"
            widget: "list"
            fields:
              - { label: "Nama Layanan", name: "nama", widget: "string" }
              - { label: "Link Formulir", name: "link", widget: "string" }
              - { label: "Ikon (SVG path atau text)", name: "ikon", widget: "string", required: false }
          - label: "Tanya Jawab (FAQ)"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Pertanyaan", name: "q", widget: "string" }
              - { label: "Jawaban", name: "a", widget: "text" }
