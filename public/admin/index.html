<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CMS Desa</title>
  <style>
    /* Styling Decap CMS agar lebih sesuai dengan warna desa (Agraris Hijau & Emas) */
    [data-slate-editor] { padding: 1rem !important; }
    .nc-app-header-container, .nc-app-header-brand-container {
      background-color: #166534 !important; /* primary-800 */
      color: #fff !important;
    }
    .nc-app-header-brand-container::after {
      content: " - Portal Rancajaya";
      font-weight: bold;
    }
    .nc-app-header-button {
      color: #fef08a !important; /* gold-200 */
    }
    .nc-app-header-button:hover {
      background-color: #14532d !important;
    }
    .nc-collectionPage-sidebar {
      background-color: #f0fdf4 !important; /* primary-50 */
    }
    .nc-collectionPage-sidebarLink {
      color: #166534 !important;
    }
    .nc-collectionPage-sidebarLink.nc-collectionPage-sidebarLink-active {
      background-color: #dcfce7 !important; /* primary-100 */
      font-weight: bold;
    }
    .nc-entryEditor-toolbar {
      background-color: #15803d !important; /* primary-700 */
    }
    .nc-entryEditor-toolbar * {
      color: #fff !important;
    }
    .nc-github-auth-button, .nc-netlify-auth-button {
      background-color: #166534 !important;
      color: white !important;
    }
  </style>
</head>

<body>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<div id="nc-root"></div>

<script src="https://unpkg.com/decap-cms@3/dist/decap-cms.js"></script>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>

</body>
</html>
